# Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Terraform dependencies (excludes /sources - managed upstream)
  - package-ecosystem: "terraform"
    directories:
      - "/"
      - "/examples/**"
      - "/modules/**"
    schedule:
      interval: "weekly"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Python dependencies (excludes /sources - managed upstream)
  - package-ecosystem: "pip"
    directories:
      - "/docs"
      - "/examples/**"
    schedule:
      interval: "weekly"

  # npm/yarn dependencies (excludes /sources - managed upstream)
  - package-ecosystem: "npm"
    directories:
      - "/examples/**"
    schedule:
      interval: "weekly"
